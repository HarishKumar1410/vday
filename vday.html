<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>For You ❤️</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      color: white;
      text-align: center;
    }

    .container {
      background: rgba(0,0,0,0.2);
      padding: 40px;
      border-radius: 20px;
      backdrop-filter: blur(10px);
    }

    h1 {
      font-size: 2.5em;
    }

    button {
      margin-top: 20px;
      padding: 12px 24px;
      border: none;
      border-radius: 10px;
      background: white;
      color: #ff4d6d;
      font-size: 1em;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.1);
    }

    .hidden {
      display: none;
      margin-top: 20px;
      font-size: 1.2em;
    }

    .heart {
      position: absolute;
      color: red;
      animation: floatUp 5s linear infinite;
    }

    @keyframes floatUp {
      0% { transform: translateY(0) scale(1); opacity: 1; }
      100% { transform: translateY(-800px) scale(1.5); opacity: 0; }
    }
  </style>
</head>
<body>

<div class="container">
  <h1>Hey Love 💖</h1>
  <p>Click the button... I made something just for you.</p>
  <button onclick="showMessage()">Click Me</button>

  <div id="message" class="hidden">
    <p>
      I just want you to know... 🌹<br><br>
      Every moment with you means the world to me.
      You make my life brighter, my heart lighter,
      and my days so much happier.
      <br><br>
      I love you more than words can ever explain ❤️
    </p>
  </div>
</div>

<script>
function showMessage() {
  document.getElementById("message").classList.remove("hidden");
  createHearts();
}

function createHearts() {
  setInterval(() => {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerText = "❤️";
    heart.style.left = Math.random() * window.innerWidth + "px";
    heart.style.fontSize = (Math.random() * 20 + 20) + "px";

    document.body.appendChild(heart);

    setTimeout(() => {
      heart.remove();
    }, 5000);
  }, 300);
}
</script>

</body>
</html>
